spring.application.name=smart-ambulance-system
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:ambulancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Static
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# App config
app.dispatch.radius-km=10.0
app.dispatch.timeout-seconds=30
app.dispatch.top-drivers=3

logging.level.com.ambulance=INFO
logging.level.org.springframework.security=WARN
